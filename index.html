<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempo Player</title>
    <style>
      :root {
        --max-width: 520px;
        --pad: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: var(--pad);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .wrap {
        width: min(var(--max-width), 100%);
        display: grid;
        gap: 16px;
        justify-items: center;
        text-align: center;
      }

      audio {
        width: 100%;
      }

      form {
        width: 100%;
      }

      #tempo {
        width: 100%;
        touch-action: pan-y; /* smoother slider interaction on mobile */
      }

      p {
        margin: 8px 0 0;
        font-size: 16px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <audio id="audio" controls playsinline>
        <source src="katie.mp3" type="audio/mp3" />
      </audio>

      <form>
        <!-- Slider is BPM -->
        <input id="tempo" type="range" value="120" min="12" max="120" step="1" />
        <p>Tempo <span id="currentTempo">120</span> bpm</p>
      </form>
    </div>

    <script>
      const audio = document.getElementById("audio");
      const slider = document.getElementById("tempo");
      const tempoLabel = document.getElementById("currentTempo");

      const BASE_BPM = 120; // playbackRate 1.0 == 120 bpm

      function updateTempo() {
        const bpm = Number(slider.value);
        tempoLabel.textContent = Math.round(bpm);
        audio.playbackRate = bpm / BASE_BPM;
      }

      slider.addEventListener("input", updateTempo);
      updateTempo();
    </script>
  </body>
</html>
